<!DOCTYPE html>
<html>
<head>
    <title>SPA - Calculator & Game</title>
   
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; }
        nav { background: #2c3e50; padding: 15px; margin-bottom: 20px; }
        nav button { margin: 0 10px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .active-btn { background: #3498db; color: white; }
        .app-container { background: white; display: inline-block; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-width: 300px; }
        /* Calculator Style */
        .calc-screen { width: 100%; height: 40px; background: #eee; margin-bottom: 10px; text-align: right; line-height: 40px; padding: 0 5px; box-sizing: border-box; }
        /* Game Style */
        .board-row { display: flex; justify-content: center; }
        .square { width: 60px; height: 60px; border: 1px solid #999; font-size: 24px; cursor: pointer; background: #fff; }
    </style>
</head>
<body>
    <nav>
    <a href="index.html">Home</a>
    <a href="javascript.html">javascript</a>
    <a href="oojs.html">oojs</a>
    <a href="react.html">react</a>
    <a href="fetchapi.html">fetchapi</a>
    <a href="axios.html">axios</a>  
    <a href="spa.html">spa</a>  
    
</nav>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        
        function Calculator() {
            const [val, setVal] = useState("");
            const btns = ["1","2","3","+","4","5","6","-","7","8","9","*","0","C","=","/"];
            
            const handleClick = (b) => {
                if (b === "=") try { setVal(eval(val).toString()); } catch { setVal("Error"); }
                else if (b === "C") setVal("");
                else setVal(val + b);
            };

            return (
                <div>
                    <h3>Simple Calculator</h3>
                    <div className="calc-screen">{val}</div>
                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '5px'}}>
                        {btns.map(b => <button key={b} onClick={() => handleClick(b)} style={{padding: '10px'}}>{b}</button>)}
                    </div>
                </div>
            );
        }

       
        function TicTacToe() {
            const [squares, setSquares] = useState(Array(9).fill(null));
            const [xIsNext, setXIsNext] = useState(true);

            const handleClick = (i) => {
                if (squares[i]) return;
                const nextSquares = squares.slice();
                nextSquares[i] = xIsNext ? "X" : "O";
                setSquares(nextSquares);
                setXIsNext(!xIsNext);
            };

            return (
                <div>
                    <h3>Tic-Tac-Toe Game</h3>
                    <div className="board">
                        {[0, 1, 2].map(row => (
                            <div key={row} className="board-row">
                                {[0, 1, 2].map(col => {
                                    const i = row * 3 + col;
                                    return <button key={i} className="square" onClick={() => handleClick(i)}>{squares[i]}</button>
                                })}
                            </div>
                        ))}
                    </div>
                    <p>Next Player: {xIsNext ? "X" : "O"}</p>
                    <button onClick={() => setSquares(Array(9).fill(null))}>Reset Game</button>
                </div>
            );
        }

       
        function MainApp() {
            const [view, setView] = useState("calc");

            return (
                <div>
                    <nav>
                        <button className={view === "calc" ? "active-btn" : ""} onClick={() => setView("calc")}>Calculator</button>
                        <button className={view === "game" ? "active-btn" : ""} onClick={() => setView("game")}>Tic-Tac-Toe</button>
                    </nav>
                    <div className="app-container">
                        {view === "calc" ? <Calculator /> : <TicTacToe />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
